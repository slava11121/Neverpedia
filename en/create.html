<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create article — Neverpedia</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../article.js" defer></script>
  <script src="../app.js" defer></script>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <a class="brand" href="index.html"><img class="logo" src="../logo.png" alt="Neverpedia"></a>
      <nav class="nav">
        <a href="index.html">Main page</a>
        <a href="create.html">Create article</a>
        <a href="#">Random article</a>
      </nav>

      <div class="lang-block">
        <div class="lang-toggle" onclick="toggleLangMenu()">Languages ▾</div>
        <div id="langList" class="lang-list">
          <a href="../create.html">Русский</a>
          <a href="create.html">English</a>
        </div>
      </div>
    </aside>

    <h3>IT DOES NOT WORK</h3>

    <main class="content">
      <div class="box">
        <div class="top">
          <h1 class="title">Create article</h1>
          <form class="search" onsubmit="return false">
            <input type="search" placeholder="Search Neverpedia…">
            <button class="btn secondary" type="button">Find</button>
          </form>
        </div>

        <form id="articleForm">
          <div class="form-row">
            <label for="title">Article title</label>
            <input id="title" type="text" required>
          </div>

          <div class="form-row">
            <label for="summary">Short description</label>
            <textarea id="summary" class="autosize" rows="3" placeholder="1–2 sentences"></textarea>
          </div>

          <div class="form-row">
            <label for="content">Content</label>
            <textarea id="content" class="autosize" rows="12" placeholder="Main article text"></textarea>
          </div>

          <div class="form-row">
            <label for="photo">Image</label>
            <input id="photo" type="file" accept="image/*">
            <small>PNG/JPG. Will appear in the preview and be saved in the article.</small>
          </div>

          <div class="form-row">
            <label>Infobox (optional)</label>
            <div class="form-row"><input id="ibox_title" type="text" placeholder="Infobox title (e.g., “F-KAP”)"></div>
            <div class="form-row"><input id="ibox_type"  type="text" placeholder="Type (e.g., Joint-stock company)"></div>
            <div class="form-row"><input id="ibox_ind"   type="text" placeholder="Industry"></div>
            <div class="form-row"><input id="ibox_loc"   type="text" placeholder="Location"></div>
            <div class="form-row"><input id="ibox_people"type="text" placeholder="Key people"></div>
            <div class="form-row"><input id="ibox_site"  type="url"  placeholder="Website (https://...)"></div>
          </div>

          <div class="form-row">
            <label for="cats">Categories</label>
            <input id="cats" type="text" placeholder="comma-separated: Auto, Kivish">
          </div>

          <div class="actions">
            <button class="btn secondary" type="button" id="btnPreview">Preview</button>
            <button class="btn" type="submit">Save</button>
          </div>
        </form>

        <div id="preview" class="preview"></div>
      </div>

      <div class="notice">
        <strong>Note:</strong> Neverpedia is a fictional project.
      </div>
    </main>
  </div>

<script>
(function(){
  const f = id => document.getElementById(id);
  let photoData = "";

  // image -> dataURL
  f('photo').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const r = new FileReader();
    r.onload = () => { photoData = r.result; };
    r.readAsDataURL(file);
  });

  function buildInfoboxObj(){
    return {
      title: f('ibox_title').value.trim(),
      type:  f('ibox_type').value.trim(),
      ind:   f('ibox_ind').value.trim(),
      loc:   f('ibox_loc').value.trim(),
      ppl:   f('ibox_people').value.trim(),
      site:  f('ibox_site').value.trim(),
    };
  }

  // preview
  function renderPreview(){
    const title = f('title').value.trim() || 'Untitled';
    const summary = f('summary').value.trim();
    const content = f('content').value.trim().replace(/\n/g,'<br>');

    const ib = buildInfoboxObj();
    const infoboxHTML =
      (ib.title || ib.type || ib.ind || ib.loc || ib.ppl || ib.site || photoData)
      ? `
        <aside class="infobox">
          ${ib.title ? `<div class="h">${ib.title}</div>` : ""}
          ${photoData ? `<div class="cell"><img src="${photoData}" alt=""></div>` : ""}
          ${ib.type ? `<div class="cell"><b>Type</b><br>${ib.type}</div>` : ""}
          ${ib.ind  ? `<div class="cell"><b>Industry</b><br>${ib.ind}</div>` : ""}
          ${ib.loc  ? `<div class="cell"><b>Location</b><br>${ib.loc}</div>` : ""}
          ${ib.ppl  ? `<div class="cell"><b>Key people</b><br>${ib.ppl}</div>` : ""}
          ${ib.site ? `<div class="cell"><b>Website</b><br><a href="${ib.site}">${ib.site}</a></div>` : ""}
        </aside>` : '';

    f('preview').innerHTML =
      '<div class="box">' +
      infoboxHTML +
      `<h1 class="title" style="margin-top:0">${title}</h1>` +
      (summary ? `<p class="lead">${summary}</p>` : "") +
      `<div>${content || '<em>Article text…</em>'}</div>` +
      '</div>';
  }

  f('btnPreview').addEventListener('click', renderPreview);

  // save
  document.getElementById('articleForm').addEventListener('submit', e=>{
    e.preventDefault();

    const title = f('title').value.trim();
    const article = {
      id:  NP.slugify(title),        // unique id
      slug: null,                    // compatibility (can stay null)
      title,
      summary: f('summary').value.trim(),
      content: f('content').value.trim(),
      photo: photoData,
      infobox: buildInfoboxObj(),
      categories: (f('cats').value || '')
                    .split(',').map(s=>s.trim()).filter(Boolean),
      createdAt: Date.now()
    };

    // old articles + new one
    const list = NP.npLoad();
    list.push(article);
    NP.npSave(list);

    // after save — go to article page
    window.location.href = `article.html?id=${encodeURIComponent(article.id)}`;
  });
})();
</script>

<script>
  function toggleLangMenu() {
    const list = document.getElementById("langList");
    list.style.display = (list.style.display === "block") ? "none" : "block";
  }
</script>
</body>
</html>
