<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fito — Главная</title>
  <style>
    :root {
      --bg-base: #141414;
      --bg-card: #222222;
      --bg-hover: #333333;
      --text-primary: #e1e3e6;
      --text-secondary: #93969b;
      --accent-color: #71aaeb;
      --border-color: #363738;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }

    a { color: var(--text-primary); text-decoration: none; cursor: pointer; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade {
      animation: fadeInUp 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* === ВЕРХНЯЯ ПАНЕЛЬ === */
    .fito-header {
      background-color: var(--bg-card);
      height: 48px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid var(--border-color);
    }
    .header-content {
      width: 100%;
      max-width: 1140px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-img { height: 24px; width: auto; display: block; }
    .search-box {
      background-color: var(--bg-hover);
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 32px;
      flex: 1;
      max-width: 300px;
      transition: background-color 0.3s;
    }
    .search-box:focus-within { background-color: #3a3a3a; }
    .search-icon { width: 16px; height: 16px; fill: var(--text-secondary); margin-right: 8px; }
    .search-box input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      outline: none;
      width: 100%;
      font-size: 13px;
    }
    .search-box input::placeholder { color: var(--text-secondary); }
    
    .header-actions { margin-left: auto; display: flex; align-items: center; }
    .btn-login {
      background-color: var(--text-primary);
      color: var(--bg-base);
      border: none;
      padding: 6px 16px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.96); }

    /* === ОСНОВНАЯ СЕТКА === */
    .main-grid {
      max-width: 1140px;
      margin: 16px auto;
      display: grid;
      grid-template-columns: 180px 1fr 280px;
      gap: 20px;
      padding: 0 16px;
      align-items: start;
    }

    /* === ЛЕВОЕ МЕНЮ === */
    .left-nav { display: flex; flex-direction: column; gap: 4px; position: sticky; top: 64px; }
    .left-nav a {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      transition: background-color 0.2s ease;
    }
    .left-nav a:hover, .left-nav a.active { background-color: var(--bg-hover); }
    .nav-icon { width: 20px; height: 20px; margin-right: 12px; fill: var(--accent-color); }

    /* === ЦЕНТРАЛЬНАЯ КОЛОНКА === */
    .feed-column { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

    .composer {
      background-color: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .composer-top { display: flex; align-items: center; gap: 12px; }
    .composer-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: var(--bg-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-weight: bold;
    }
    .composer-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      cursor: pointer;
    }
    .composer-input::placeholder { color: var(--text-secondary); }
    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-color);
      padding-top: 12px;
    }
    .composer-tools { display: flex; gap: 16px; }
    .tool-icon { width: 20px; height: 20px; fill: var(--text-secondary); cursor: pointer; transition: fill 0.2s;}
    .tool-icon:hover { fill: var(--text-primary); }
    .btn-post {
      background-color: var(--bg-hover);
      color: var(--text-secondary);
      border: none;
      padding: 6px 16px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }
    .btn-post:hover { background-color: var(--border-color); color: var(--text-primary); }

    .unregistered-state, .public-state {
      background-color: var(--bg-card);
      border-radius: var(--radius);
      text-align: center;
    }
    .unregistered-state { padding: 60px 20px; color: var(--text-secondary); }
    .unregistered-state h2 { color: var(--text-primary); margin-bottom: 12px; font-size: 18px; }
    .unregistered-state p { margin-bottom: 24px; font-size: 14px; line-height: 1.5; }
    .public-state { padding: 40px 30px; color: var(--text-primary); }

    /* === ПРАВАЯ КОЛОНКА === */
    .right-column { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 64px; }
    .block-card {
      background-color: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
    }
    .block-title {
      font-size: 12px;
      font-weight: bold;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* === КОРРЕКТНАЯ СЕТКА ДЛЯ ПОСТОВ FITO === */
.post-card {
  background-color: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.post-header {
  display: flex;
  align-items: center;
  gap: 12px; /* Расстояние между аватаркой и блоком имени */
}

.post-header-avatar {
  width: 40px;
  height: 40px;
  border-radius: 4px; /* Каноничный квадратный вид 1997 года */
  object-fit: cover;
  flex-shrink: 0; /* Чтобы аватарка не сжималась */
}

.post-author-info {
  display: flex;
  flex-direction: column;
  gap: 20px; /* Минимальный зазор между именем и временем */
}

.post-author {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.2;
}

.post-time {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.2;
}

.post-image {
  width: 100%;
  max-height: 450px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  margin-top: 4px;
}

    /* === ВИДЖЕТ ПОГОДЫ === */
    .weather-city { font-size: 16px; font-weight: bold; color: var(--text-primary); }
    .weather-date { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; text-transform: capitalize; }
    .weather-temp-box { display: flex; align-items: center; gap: 12px; }
    .weather-temp { font-size: 28px; font-weight: bold; color: var(--accent-color); }
    .weather-desc { font-size: 13px; color: var(--text-primary); line-height: 1.3;}

  </style>
</head>
<body>

  <header class="fito-header">
    <div class="header-content">
      <a class="logo"><img src="logo.png" alt="Fito" class="logo-img"></a>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Поиск">
      </div>
      <div class="header-actions">
        <button class="btn-login">Войти</button>
      </div>
    </div>
  </header>

  <div class="main-grid">
    
    <nav class="left-nav" id="side-nav">
      <a onclick="openTab('private', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> Мой профиль</a>
      <a onclick="openTab('feed', this)" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Лента</a>
      <a onclick="openTab('private', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg> Мессенджер</a>
      <a onclick="openTab('private', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Друзья</a>
      <a onclick="openTab('private', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg> Фотографии</a>
      <a onclick="openTab('music', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg> Музыка</a>
      <a onclick="openTab('video', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg> Видео</a>
      <a onclick="openTab('games', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 6.5 18.5 6.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg> Игры</a>
    </nav>

    <div class="feed-column" id="main-content">
      <div class="animate-fade">
        <div class="composer">
          <div class="composer-top">
            <div class="composer-avatar">?</div>
            <input type="text" class="composer-input" placeholder="Что у вас нового?" readonly onclick="openTab('private')">
          </div>
          <div class="composer-actions">
            <div class="composer-tools">
              <svg class="tool-icon" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
              <svg class="tool-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </div>
            <button class="btn-post" onclick="openTab('private')">Создать пост</button>
          </div>
        </div>
        <div id="fito-feed"></div>
      </div>
    </div>

    <div class="right-column">
      <div class="block-card">
        <div class="block-title">Погода</div>
        <div class="weather-city">Кора</div>
        <div class="weather-date" id="w-date">Загрузка...</div>
        
        <div class="weather-temp-box">
          <div class="weather-temp" id="w-temp">--°C</div>
          <div class="weather-desc" id="w-desc">Подключение к метеостанции...</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const rawFeedHTML = `
      <div class="composer">
        <div class="composer-top">
          <div class="composer-avatar">?</div>
          <input type="text" class="composer-input" placeholder="Что у вас нового?" readonly onclick="openTab('private')">
        </div>
        <div class="composer-actions">
          <div class="composer-tools">
            <svg class="tool-icon" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <svg class="tool-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          </div>
          <button class="btn-post" onclick="openTab('private')">Создать пост</button>
        </div>
      </div>
      <div id="fito-feed"></div>
    `;

    function openTab(tabType, element) {
      if (element) {
        document.querySelectorAll('.left-nav a').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
      }

      const mainContent = document.getElementById('main-content');
      let newHTML = '';

      if (tabType === 'feed') {
        newHTML = rawFeedHTML;
      } 
      else if (tabType === 'private') {
        newHTML = `
          <div class="unregistered-state">
            <h2>Вы не вошли в аккаунт</h2>
            <p>Чтобы просматривать этот раздел и общаться с пользователями,<br>пожалуйста, войдите в свой профиль.</p>
            <button class="btn-login" style="padding: 10px 24px;">Войти в Fito</button>
          </div>
        `;
      }
      else if (tabType === 'music') {
        newHTML = `<div class="public-state"><h2>Музыка</h2><p style="color: var(--text-secondary); margin-top: 10px;">Список доступных аудиозаписей.</p></div>`;
      }
      else if (tabType === 'video') {
        newHTML = `<div class="public-state"><h2>Видео</h2><p style="color: var(--text-secondary); margin-top: 10px;">Каталог видеороликов и трансляций.</p></div>`;
      }
      else if (tabType === 'games') {
        newHTML = `<div class="public-state"><h2>Игры</h2><p style="color: var(--text-secondary); margin-top: 10px;">Встроенные развлечения.</p></div>`;
      }

      mainContent.innerHTML = `<div class="animate-fade">${newHTML}</div>`;
    }

    // Загрузка реальной погоды Иркутска (Коры) через Open-Meteo
    async function fetchWeather() {
      try {
        const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.2978&longitude=104.2964&current=temperature_2m,weather_code&timezone=auto');
        const data = await response.json();
        
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        
        // Расшифровка кодов погоды
        let desc = "Облачно";
        if (code === 0) desc = "Ясно";
        else if (code === 1 || code === 2 || code === 3) desc = "Переменная облачность";
        else if (code >= 45 && code <= 48) desc = "Туман";
        else if (code >= 51 && code <= 67) desc = "Дождь";
        else if (code >= 71 && code <= 86) desc = "Снег";
        else if (code >= 95) desc = "Гроза";

        const tempStr = temp > 0 ? `+${temp}°C` : `${temp}°C`;
        document.getElementById('w-temp').textContent = tempStr;
        document.getElementById('w-desc').textContent = desc;

      } catch (error) {
        document.getElementById('w-desc').textContent = "Связь со станцией прервана";
      }

      // Установка текущей даты
      const today = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      let dateString = today.toLocaleDateString('ru-RU', options);
      // Делаем первую букву заглавной
      dateString = dateString.charAt(0).toUpperCase() + dateString.slice(1);
      document.getElementById('w-date').textContent = dateString;
    }

    // Запускаем при загрузке страницы
    window.addEventListener('DOMContentLoaded', fetchWeather);

  </script>

  <script src="posts.js"></script>

</body>
</html>
