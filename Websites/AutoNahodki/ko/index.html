<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오토-파인드</title>
  <script>
    history.scrollRestoration = 'manual';
  </script>
  <style>
    :root{
      --bg:#1b1b1f;
      --bg2:#232329;
      --panel:#2b2b33;
      --panel2:#34343d;
      --line:rgba(255,255,255,.08);
      --text:#f3f3f5;
      --muted:#b7b7c0;
      --red:#c81f32;
      --red2:#9f1626;
      --radius:18px;
      --shadow:0 18px 36px rgba(0,0,0,.3);
      --max:1360px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font:16px/1.45 Inter, Arial, sans-serif;
      background:linear-gradient(180deg,#17171a 0%, #1d1d22 100%);
      color:var(--text);
      animation:pageFadeIn .45s ease both;
    }

    @keyframes pageFadeIn{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes cardFadeIn{
      from{
        opacity:0;
        transform:translateY(12px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button,input,select{font:inherit}

    .container{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(23,23,26,.96);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(8px);
    }

    .topbar-inner{
      min-height:92px;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:14px;
    }

    .side-left,.side-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .side-right{justify-content:flex-end}

    .top-button{
      min-height:46px;
      padding:0 16px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
      transition:.2s ease;
    }

    .top-button:hover{
      background:var(--panel2);
      border-color:rgba(200,31,50,.35);
    }

    .top-button.red{
      background:linear-gradient(180deg,var(--red),var(--red2));
      border-color:rgba(255,255,255,.05);
    }

    .country-wrap,
    .lang-wrap{
      position:relative;
    }

    .country-button{
      width:54px;
      height:46px;
      padding:0;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel);
      color:var(--text);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
      overflow:hidden;
    }

    .country-button:hover{
      background:var(--panel2);
      border-color:rgba(200,31,50,.35);
    }

    .country-flag{
      width:28px;
      height:28px;
      object-fit:cover;
      border-radius:8px;
      flex-shrink:0;
    }

    .country-panel,
    .lang-panel{
      position:absolute;
      right:0;
      top:calc(100% + 8px);
      background:#232329;
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:8px;
      opacity:0;
      visibility:hidden;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease, visibility .22s ease;
    }

    .country-panel{
      width:240px;
    }

    .lang-panel{
      width:220px;
    }

    .country-panel.open,
    .lang-panel.open{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
    }

    .country-option{
      width:100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding:11px 12px;
      border-radius:12px;
      border:none;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      text-align:left;
    }

    .country-option:hover,
    .lang-link:hover{
      background:var(--panel);
    }

    .country-option.active{
      background:rgba(200,31,50,.12);
      border:1px solid rgba(200,31,50,.25);
    }

    .country-option img{
      width:24px;
      height:24px;
      object-fit:cover;
      border-radius:7px;
      flex-shrink:0;
    }

    .country-option-text{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .country-option-title{
      font-size:14px;
      font-weight:700;
      line-height:1.2;
    }

    .country-option-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.2;
    }

    .lang-link{
      display:block;
      padding:11px 12px;
      border-radius:12px;
      color:var(--text);
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .logo-photo{
      width:320px;
      max-width:100%;
      height:76px;
      object-fit:cover;
      border-radius:16px;
      border:none;
      box-shadow:none;
      background:transparent;
    }

    .dropdown-panel{
      max-height:0;
      opacity:0;
      visibility:hidden;
      border-top:1px solid transparent;
      background:#212126;
      overflow:hidden;
      transition:max-height .28s ease, opacity .22s ease, visibility .22s ease, border-color .22s ease;
    }

    .dropdown-panel.open{
      max-height:260px;
      opacity:1;
      visibility:visible;
      border-top:1px solid var(--line);
    }

    .dropdown-inner{padding:16px 0 18px}

    .filters-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    .field label{
      font-size:14px;
      color:var(--muted);
    }

    .field input,.field select{
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      padding:0 12px;
      outline:none;
    }

    .filter-actions{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .content{padding:18px 0 34px}

    .results-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
    }

    .results-head h1{
      margin:0;
      font-size:28px;
      letter-spacing:-.03em;
    }

    .results-head p{
      margin:4px 0 0;
      color:var(--muted);
    }

    .sort-select{
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      padding:0 12px;
    }

    .cars-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    .car-card{
      background:linear-gradient(180deg,#26262c 0%, #222228 100%);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
      animation:cardFadeIn .35s ease both;
    }

    .car-card:nth-child(1){animation-delay:.02s}
    .car-card:nth-child(2){animation-delay:.05s}
    .car-card:nth-child(3){animation-delay:.08s}
    .car-card:nth-child(4){animation-delay:.11s}
    .car-card:nth-child(5){animation-delay:.14s}
    .car-card:nth-child(6){animation-delay:.17s}
    .car-card:nth-child(7){animation-delay:.20s}
    .car-card:nth-child(8){animation-delay:.23s}
    .car-card:nth-child(9){animation-delay:.26s}
    .car-card:nth-child(10){animation-delay:.29s}
    .car-card:nth-child(11){animation-delay:.32s}
    .car-card:nth-child(12){animation-delay:.35s}

    .car-image-wrap{
      position:relative;
      aspect-ratio:16/10;
      background:#303038;
    }

    .car-image{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .badge-row{
      position:absolute;
      top:12px;
      left:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .badge{
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:rgba(18,18,22,.78);
      border:1px solid rgba(255,255,255,.12);
    }

    .badge.red{
      background:rgba(200,31,50,.92);
      border-color:rgba(255,255,255,.06);
    }

    .car-body{padding:16px}

    .car-top{
      display:flex;
      justify-content:space-between;
      align-items:start;
      gap:12px;
      margin-bottom:12px;
    }

    .car-title{
      margin:0 0 5px;
      font-size:24px;
      letter-spacing:-.03em;
    }

    .car-sub{
      color:var(--muted);
      font-size:14px;
    }

    .price{
      text-align:right;
      white-space:nowrap;
      color:#fff;
    }

    .price strong{
      display:block;
      font-size:24px;
      line-height:1;
    }

    .price span{
      color:var(--muted);
      font-size:13px;
    }

    .specs{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
      margin-bottom:12px;
    }

    .spec{
      padding:10px 12px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:12px;
    }

    .spec b{
      display:block;
      margin-bottom:3px;
      font-size:14px;
    }

    .spec span{
      color:var(--muted);
      font-size:13px;
    }

    .car-desc{
      color:#dddddf;
      margin-bottom:14px;
      min-height:44px;
    }

    .car-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .car-meta{
      color:var(--muted);
      font-size:14px;
    }

    .mini-btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .mini-btn{
      min-height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
    }

    .mini-btn.red{
      background:linear-gradient(180deg,var(--red),var(--red2));
      border-color:rgba(255,255,255,.05);
    }

    .footer{
      padding:10px 0 28px;
      color:var(--muted);
      font-size:14px;
      text-align:center;
    }

    @media (max-width:1120px){
      .filters-grid{grid-template-columns:repeat(3,1fr)}
    }

    @media (max-width:860px){
      .topbar-inner{
        grid-template-columns:1fr;
        padding:12px 0;
      }

      .side-left,.side-right,.logo-wrap{justify-content:center}
      .filters-grid,.cars-grid{grid-template-columns:1fr}
      .results-head,.car-top{flex-direction:column;align-items:start}
      .price{text-align:left}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="side-left">
        <button class="top-button red" id="filtersToggle">필터</button>
      </div>

      <div class="logo-wrap">
        <img class="logo-photo" src="an-ko.png" alt="오토-파인드 로고" />
      </div>

      <div class="side-right">
        <div class="country-wrap">
          <button class="country-button" id="countryToggle" type="button" aria-label="국가 선택">
            <img class="country-flag" id="currentCountryFlag" src="../../../001.jpg" alt="현재 국가">
          </button>

          <div class="country-panel" id="countryPanel">
            <button class="country-option" type="button" data-country="main">
              <img src="../../../001.jpg" alt="기본 키비시">
              <span class="country-option-text">
                <span class="country-option-title">기본 키비시</span>
                <span class="country-option-sub">기본 카탈로그</span>
              </span>
            </button>

            <button class="country-option" type="button" data-country="kkp">
              <img src="../../../054.jpg" alt="KKP">
              <span class="country-option-text">
                <span class="country-option-title">KKP</span>
                <span class="country-option-sub">KKP 카탈로그</span>
              </span>
            </button>
          </div>
        </div>

        <div class="lang-wrap">
          <button class="top-button" id="langToggle">Языки</button>
          <div class="lang-panel" id="langPanel">
            <a class="lang-link" href="../index.html">Русский</a>
            <a class="lang-link" href="../en/index.html">English</a>
            <a class="lang-link" href="../ksh/index.html">Кiвiшский</a>
            <a class="lang-link" href="index.html">한국어</a>
          </div>
        </div>
      </div>
    </div>

    <div class="dropdown-panel" id="filtersPanel">
      <div class="container dropdown-inner">
        <div class="filters-grid">
          <div class="field">
            <label for="searchInput">검색</label>
            <input id="searchInput" type="text" placeholder="브랜드 또는 모델" />
          </div>
          <div class="field">
            <label for="typeFilter">판매 유형</label>
            <select id="typeFilter">
              <option value="all">전체</option>
              <option value="found">찾은 매물</option>
              <option value="private">개인 매물</option>
            </select>
          </div>
          <div class="field">
            <label for="cityFilter">도시</label>
            <select id="cityFilter">
              <option value="all">상관없음</option>
              <option value="Кора">코라</option>
              <option value="Мири">미리</option>
              <option value="Автово">아브토보</option>
              <option value="Город Д">도시 D</option>
            </select>
          </div>
          <div class="field">
            <label for="priceFilter">최대 가격</label>
            <input id="priceFilter" type="number" placeholder="예: 1200000" />
          </div>
          <div class="field">
            <label for="gearboxFilter">변속기</label>
            <select id="gearboxFilter">
              <option value="all">상관없음</option>
              <option value="механика">수동</option>
              <option value="автомат">자동</option>
            </select>
          </div>
        </div>

        <div class="filter-actions">
          <button class="top-button red" id="applyFilters">적용</button>
          <button class="top-button" id="resetFilters">초기화</button>
          <button class="top-button" id="rerollCars">목록 새로고침</button>
        </div>
      </div>
    </div>
  </header>

  <main class="content">
    <div class="container">
      <div class="results-head">
        <div>
          <h1>자동차</h1>
          <p id="resultsText">0개의 매물이 표시됨</p>
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="default">무작위 순</option>
          <option value="new">최신순</option>
          <option value="cheap">저렴한 순</option>
          <option value="expensive">비싼 순</option>
        </select>
      </div>

      <section class="cars-grid" id="carsGrid"></section>
    </div>
  </main>

  <footer class="footer">
    오토-파인드 — 자동차 카탈로그
  </footer>

  <script>
    const COUNTRY_CONFIG = {
      main: {
        label: '기본 키비시',
        flag: '../../../001.jpg',
        script: 'catalog.js'
      },
      kkp: {
        label: 'KKP',
        flag: '../../../054.jpg',
        script: 'catalog-kkp.js'
      }
    };

    const selectedCatalog = localStorage.getItem('selectedCatalog') || 'kkp';

    const countryToggle = document.getElementById('countryToggle');
    const countryPanel = document.getElementById('countryPanel');
    const currentCountryFlag = document.getElementById('currentCountryFlag');
    const countryOptions = document.querySelectorAll('.country-option');

    function applyCountryUI() {
      const config = COUNTRY_CONFIG[selectedCatalog] || COUNTRY_CONFIG.main;
      currentCountryFlag.src = config.flag;
      currentCountryFlag.alt = config.label;
      countryToggle.title = config.label;

      countryOptions.forEach(option => {
        option.classList.toggle('active', option.dataset.country === selectedCatalog);
      });
    }

    function switchCatalog(type) {
      localStorage.setItem('selectedCatalog', type);
      location.reload();
    }

    countryToggle.addEventListener('click', () => {
      countryPanel.classList.toggle('open');
      const langPanel = document.getElementById('langPanel');
      if (langPanel) langPanel.classList.remove('open');
      const filtersPanel = document.getElementById('filtersPanel');
      if (filtersPanel) filtersPanel.classList.remove('open');
    });

    countryOptions.forEach(option => {
      option.addEventListener('click', () => {
        switchCatalog(option.dataset.country);
      });
    });

    document.addEventListener('click', (e) => {
      const insideCountry = e.target.closest('.country-wrap');
      if (!insideCountry) {
        countryPanel.classList.remove('open');
      }
    });

    applyCountryUI();

    const script = document.createElement('script');
    script.src = (COUNTRY_CONFIG[selectedCatalog] || COUNTRY_CONFIG.main).script;
    document.body.appendChild(script);
  </script>
</body>
</html>
